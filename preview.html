<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一日タスク管理</title>

  <style>
    :root {
      --bg: #1f1f25;
      --panel: #2a2a33;
      --panel2: #343441;
      --text: #f2f2f2;
      --muted: #b7b7c9;
      --line: #4a4a5c;
      --accent: #4a90e2;
      --danger: #d9534f;
      --success: #4caf50;
      --warning: #ffb300;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Meiryo", sans-serif;
    }

    .wrap {
      max-width: 1600px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      font-size: 14px;
      line-height: 1.2;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-copy {
      background: #6f7cff;
    }

    .btn-status {
      min-width: 88px;
      font-weight: 700;
    }

    .status-todo {
      background: #6c757d;
    }

    .status-doing {
      background: var(--warning);
      color: #222;
    }

    .status-done {
      background: var(--success);
    }

    .table-wrap {
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .table-wrap.resizing {
      user-select: none;
    }

    .table-width-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 14px;
      height: 14px;
      cursor: ew-resize;
      z-index: 30;
      background: rgba(74, 144, 226, 0.18);
      border-left: 1px solid rgba(74, 144, 226, 0.45);
      border-bottom: 1px solid rgba(74, 144, 226, 0.45);
      border-bottom-left-radius: 8px;
    }

    .table-width-resizer:hover,
    .table-width-resizer.active {
      background: rgba(74, 144, 226, 0.45);
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      background: var(--panel2);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      font-size: 14px;
      white-space: nowrap;
      position: relative;
      overflow: visible;
    }

    tbody tr.dragging {
      opacity: 0.45;
    }

    tbody tr.drag-over {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: rgba(74, 144, 226, 0.12);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    input[type="text"] {
      width: 100%;
      background: #1b1b22;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-size: 14px;
      min-width: 0;
    }

    .time-input {
      width: 100%;
      text-align: center;
      font-family: Consolas, monospace;
    }

    .task-input {
      width: 100%;
      min-width: 0;
      text-align: left;
    }

    .work-minutes-cell {
      min-width: 80px;
      font-weight: 700;
      white-space: nowrap;
      color: var(--muted);
    }

    .drag-handle {
      cursor: grab;
      user-select: none;
      font-size: 18px;
      color: var(--muted);
      padding: 0 4px;
      display: inline-block;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .check-cell input {
      transform: scale(1.2);
      cursor: pointer;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    th.resizable {
      position: relative;
    }

    .col-resizer {
      position: absolute;
      top: 0;
      right: -4px;
      width: 10px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      z-index: 20;
    }

    .col-resizer:hover {
      background: rgba(74, 144, 226, 0.35);
    }

    .col-resizer.active {
      background: rgba(74, 144, 226, 0.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>一日タスク管理</h1>

    <div class="toolbar">
      <button id="addTaskBtn" type="button">タスク作成</button>
      <button id="resetAllBtn" type="button" class="btn-danger">保存データ初期化</button>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div
        class="table-width-resizer"
        id="tableWidthResizer"
        title="表の横幅を変更"
      ></div>

      <table id="taskTable">
        <colgroup id="taskColGroup">
          <col style="width: 70px;" />
          <col style="width: 130px;" />
          <col style="width: 130px;" />
          <col style="width: 320px;" />
          <col style="width: 120px;" />
          <col style="width: 120px;" />
          <col style="width: 90px;" />
          <col style="width: 90px;" />
          <col style="width: 90px;" />
        </colgroup>

        <thead>
          <tr>
            <th class="resizable">移動</th>
            <th class="resizable">予定開始</th>
            <th class="resizable">予定終了</th>
            <th class="resizable">タスク</th>
            <th class="resizable">状態</th>
            <th class="resizable">作業時間</th>
            <th class="resizable">未完了</th>
            <th class="resizable">削除</th>
            <th>複製</th>
          </tr>
        </thead>

        <tbody id="taskTableBody"></tbody>
      </table>
    </div>

    <div class="hint">
      ※ 行移動は三本線だけドラッグできるっす。<br />
      ※ 列の右端をドラッグすると、その列の横幅を変更できるっす。<br />
      ※ 表の右上の小さいハンドルを左右ドラッグすると、表全体の横幅を変更できるっす。<br />
      ※ 表データ・列幅・表幅は自動保存するっす。<br />
      ※ 時間は HH:MM 形式っす。<br />
      ※ 作業時間は予定開始〜予定終了の差分を分で表示するっす。
    </div>
  </div>

  <script>
    const STORAGE_KEY_ROWS = "dailyTaskManager.rows";
    const STORAGE_KEY_COL_WIDTHS = "dailyTaskManager.colWidths";
    const STORAGE_KEY_TABLE_WIDTH = "dailyTaskManager.tableWidth";

    const STATUS_TODO = "未着手";
    const STATUS_DOING = "仕掛";
    const STATUS_DONE = "完了";

    const table = document.getElementById("taskTable");
    const tableBody = document.getElementById("taskTableBody");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const resetAllBtn = document.getElementById("resetAllBtn");
    const colGroup = document.getElementById("taskColGroup");
    const tableWrap = document.getElementById("tableWrap");
    const tableWidthResizer = document.getElementById("tableWidthResizer");

    let dragRow = null;

    addTaskBtn.addEventListener("click", () => {
      const newRow = addRow();
      saveAll();

      if (newRow) {
        const taskInput = newRow.querySelector(".task-name");
        if (taskInput) {
          taskInput.focus();
        }
      }
    });

    resetAllBtn.addEventListener("click", () => {
      const ok = confirm("保存データを初期化しますか？");

      if (!ok) {
        return;
      }

      localStorage.removeItem(STORAGE_KEY_ROWS);
      localStorage.removeItem(STORAGE_KEY_COL_WIDTHS);
      localStorage.removeItem(STORAGE_KEY_TABLE_WIDTH);

      tableBody.innerHTML = "";

      resetColumnWidthsToDefault();
      resetTableWidthToDefault();

      addRow();
      saveAll();
    });

    function addRow(data = null, insertAfterRow = null) {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>
          <span class="drag-handle" title="ドラッグして移動">☰</span>
        </td>
        <td>
          <input
            type="text"
            class="time-input start-time"
            placeholder="00:00"
            maxlength="5"
          >
        </td>
        <td>
          <input
            type="text"
            class="time-input end-time"
            placeholder="00:00"
            maxlength="5"
          >
        </td>
        <td>
          <input
            type="text"
            class="task-input task-name"
            placeholder="タスク名"
          >
        </td>
        <td>
          <button
            type="button"
            class="btn-status status-todo"
          >${STATUS_TODO}</button>
        </td>
        <td class="work-minutes-cell"></td>
        <td class="check-cell">
          <input
            type="checkbox"
            class="incomplete-check"
          >
        </td>
        <td>
          <button
            type="button"
            class="btn-danger delete-btn"
          >削除</button>
        </td>
        <td>
          <button
            type="button"
            class="btn-copy copy-btn"
          >複製</button>
        </td>
      `;

      if (
        insertAfterRow &&
        insertAfterRow.parentNode === tableBody
      ) {
        insertAfterRow.insertAdjacentElement("afterend", tr);
      } else {
        tableBody.appendChild(tr);
      }

      bindRowEvents(tr);

      if (data) {
        applyRowDataToElement(tr, data);
      } else {
        updateWorkMinutes(tr);
      }

      return tr;
    }

    function bindRowEvents(tr) {
      const dragHandle = tr.querySelector(".drag-handle");
      const startInput = tr.querySelector(".start-time");
      const endInput = tr.querySelector(".end-time");
      const taskInput = tr.querySelector(".task-name");
      const incompleteCheck = tr.querySelector(".incomplete-check");
      const statusBtn = tr.querySelector(".btn-status");
      const deleteBtn = tr.querySelector(".delete-btn");
      const copyBtn = tr.querySelector(".copy-btn");

      dragHandle.draggable = true;

      startInput.addEventListener("blur", () => {
        startInput.value = normalizeTimeInputValue(startInput.value);
        updateWorkMinutes(tr);
        saveAll();
      });

      endInput.addEventListener("blur", () => {
        endInput.value = normalizeTimeInputValue(endInput.value);
        updateWorkMinutes(tr);
        saveAll();
      });

      taskInput.addEventListener("input", () => {
        saveAll();
      });

      incompleteCheck.addEventListener("change", () => {
        saveAll();
      });

      statusBtn.addEventListener("click", () => {
        cycleStatus(tr);
      });

      deleteBtn.addEventListener("click", () => {
        tr.remove();
        saveAll();
      });

      copyBtn.addEventListener("click", () => {
        duplicateRow(tr);
        saveAll();
      });

      dragHandle.addEventListener("dragstart", (e) => {
        if (isColumnResizeInProgress() || isTableResizeInProgress()) {
          e.preventDefault();
          return;
        }

        dragRow = tr;
        tr.classList.add("dragging");

        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", "row-drag");
        }
      });

      dragHandle.addEventListener("dragend", () => {
        tr.classList.remove("dragging");
        clearDragOver();
        dragRow = null;
        saveAll();
      });

      tr.addEventListener("dragover", (e) => {
        e.preventDefault();

        if (!dragRow || dragRow === tr) {
          return;
        }

        tr.classList.add("drag-over");
      });

      tr.addEventListener("dragleave", () => {
        tr.classList.remove("drag-over");
      });

      tr.addEventListener("drop", (e) => {
        e.preventDefault();

        if (!dragRow || dragRow === tr) {
          return;
        }

        tr.classList.remove("drag-over");

        const rows = [...tableBody.querySelectorAll("tr")];
        const dragIndex = rows.indexOf(dragRow);
        const dropIndex = rows.indexOf(tr);

        if (dragIndex < dropIndex) {
          tableBody.insertBefore(dragRow, tr.nextSibling);
        } else {
          tableBody.insertBefore(dragRow, tr);
        }

        saveAll();
      });
    }

    function clearDragOver() {
      const rows = tableBody.querySelectorAll("tr");

      rows.forEach((row) => {
        row.classList.remove("drag-over");
      });
    }

    function duplicateRow(sourceRow) {
      const rowData = readRowDataFromElement(sourceRow);
      addRow(rowData, sourceRow);
    }

    function readRowDataFromElement(tr) {
      const startTime = tr.querySelector(".start-time").value;
      const endTime = tr.querySelector(".end-time").value;
      const taskName = tr.querySelector(".task-name").value;
      const status = tr.querySelector(".btn-status").textContent;
      const incomplete = tr.querySelector(".incomplete-check").checked;
      const workMinutesText = tr.querySelector(".work-minutes-cell").textContent;

      return {
        startTime: startTime,
        endTime: endTime,
        taskName: taskName,
        status: status,
        incomplete: incomplete,
        workMinutesText: workMinutesText
      };
    }

    function applyRowDataToElement(tr, data) {
      tr.querySelector(".start-time").value = data.startTime || "";
      tr.querySelector(".end-time").value = data.endTime || "";
      tr.querySelector(".task-name").value = data.taskName || "";
      tr.querySelector(".incomplete-check").checked = !!data.incomplete;

      setStatus(
        tr,
        data.status || STATUS_TODO
      );

      if (data.workMinutesText) {
        tr.querySelector(".work-minutes-cell").textContent = data.workMinutesText;
      } else {
        updateWorkMinutes(tr);
      }
    }

    function cycleStatus(tr) {
      const btn = tr.querySelector(".btn-status");
      const current = btn.textContent;

      if (current === STATUS_TODO) {
        const ok = confirm("仕掛ますか？");

        if (!ok) {
          return;
        }

        setStatus(tr, STATUS_DOING);
        saveAll();
        return;
      }

      if (current === STATUS_DOING) {
        setStatus(tr, STATUS_DONE);
        saveAll();
        return;
      }

      if (current === STATUS_DONE) {
        const ok = confirm("未着手にしますか？");

        if (!ok) {
          return;
        }

        setStatus(tr, STATUS_TODO);
        saveAll();
      }
    }

    function setStatus(tr, status) {
      const btn = tr.querySelector(".btn-status");

      btn.textContent = status;

      btn.classList.remove("status-todo");
      btn.classList.remove("status-doing");
      btn.classList.remove("status-done");

      if (status === STATUS_TODO) {
        btn.classList.add("status-todo");
        return;
      }

      if (status === STATUS_DOING) {
        btn.classList.add("status-doing");
        return;
      }

      if (status === STATUS_DONE) {
        btn.classList.add("status-done");
      }
    }

    function updateWorkMinutes(tr) {
      const startValue = tr.querySelector(".start-time").value;
      const endValue = tr.querySelector(".end-time").value;
      const cell = tr.querySelector(".work-minutes-cell");

      if (!isValidTime(startValue) || !isValidTime(endValue)) {
        cell.textContent = "";
        return;
      }

      const startMinutes = timeStringToMinutes(startValue);
      const endMinutes = timeStringToMinutes(endValue);
      let diffMinutes = endMinutes - startMinutes;

      if (diffMinutes < 0) {
        diffMinutes += 24 * 60;
      }

      cell.textContent = `${diffMinutes}分`;
    }

    function normalizeTimeInputValue(value) {
      if (!value) {
        return "";
      }

      const digits = value.replace(/\D/g, "");

      if (digits.length === 0) {
        return "";
      }

      let hh = "00";
      let mm = "00";

      if (digits.length <= 2) {
        hh = digits.padStart(2, "0");
      } else {
        const padded = digits.slice(0, 4).padEnd(4, "0");
        hh = padded.slice(0, 2);
        mm = padded.slice(2, 4);
      }

      let h = Number(hh);
      let m = Number(mm);

      if (Number.isNaN(h) || Number.isNaN(m)) {
        return "";
      }

      if (h > 23) {
        h = 23;
      }

      if (m > 59) {
        m = 59;
      }

      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function isValidTime(value) {
      return /^([01]\d|2[0-3]):[0-5]\d$/.test(value);
    }

    function timeStringToMinutes(value) {
      const parts = value.split(":");
      const hh = Number(parts[0]);
      const mm = Number(parts[1]);

      return hh * 60 + mm;
    }

    function saveAll() {
      saveRows();
      saveColumnWidths();
      saveTableWidth();
    }

    function saveRows() {
      const rows = [...tableBody.querySelectorAll("tr")].map((tr) => {
        return readRowDataFromElement(tr);
      });

      localStorage.setItem(
        STORAGE_KEY_ROWS,
        JSON.stringify(rows)
      );
    }

    function saveColumnWidths() {
      const cols = [...colGroup.querySelectorAll("col")].map((col) => {
        return col.style.width || "";
      });

      localStorage.setItem(
        STORAGE_KEY_COL_WIDTHS,
        JSON.stringify(cols)
      );
    }

    function saveTableWidth() {
      const width = tableWrap.style.width || "";

      localStorage.setItem(
        STORAGE_KEY_TABLE_WIDTH,
        width
      );
    }

    function loadAll() {
      loadColumnWidths();
      loadTableWidth();
      loadRows();

      const rowCount = tableBody.querySelectorAll("tr").length;

      if (rowCount === 0) {
        addRow();
        saveAll();
      }
    }

    function loadRows() {
      const raw = localStorage.getItem(STORAGE_KEY_ROWS);

      if (!raw) {
        return;
      }

      let rows;

      try {
        rows = JSON.parse(raw);
      } catch (error) {
        rows = [];
      }

      if (!Array.isArray(rows)) {
        return;
      }

      rows.forEach((rowData) => {
        addRow(rowData);
      });
    }

    function loadColumnWidths() {
      const raw = localStorage.getItem(STORAGE_KEY_COL_WIDTHS);

      if (!raw) {
        return;
      }

      let widths;

      try {
        widths = JSON.parse(raw);
      } catch (error) {
        widths = [];
      }

      if (!Array.isArray(widths)) {
        return;
      }

      const cols = colGroup.querySelectorAll("col");

      widths.forEach((width, index) => {
        if (!cols[index]) {
          return;
        }

        if (!width) {
          return;
        }

        cols[index].style.width = width;
      });
    }

    function loadTableWidth() {
      const width = localStorage.getItem(STORAGE_KEY_TABLE_WIDTH);

      if (!width) {
        return;
      }

      tableWrap.style.width = width;
    }

    function resetColumnWidthsToDefault() {
      const defaults = [
        "70px",
        "130px",
        "130px",
        "320px",
        "120px",
        "120px",
        "90px",
        "90px",
        "90px"
      ];

      const cols = colGroup.querySelectorAll("col");

      cols.forEach((col, index) => {
        col.style.width = defaults[index] || "120px";
      });
    }

    function resetTableWidthToDefault() {
      tableWrap.style.width = "";
    }

    function enableColumnResize() {
      const headers = table.querySelectorAll("thead th");
      const cols = colGroup.querySelectorAll("col");

      headers.forEach((th, index) => {
        if (!th.classList.contains("resizable")) {
          return;
        }

        if (!cols[index]) {
          return;
        }

        const resizer = document.createElement("span");

        resizer.className = "col-resizer";

        th.appendChild(resizer);

        let startX = 0;
        let startWidth = 0;
        let active = false;

        resizer.addEventListener("mousedown", (e) => {
          e.preventDefault();
          e.stopPropagation();

          active = true;
          startX = e.pageX;
          startWidth = th.getBoundingClientRect().width;

          resizer.classList.add("active");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";

          function onMouseMove(ev) {
            if (!active) {
              return;
            }

            const diff = ev.pageX - startX;
            const newWidth = Math.max(
              50,
              Math.round(startWidth + diff)
            );

            cols[index].style.width = `${newWidth}px`;
          }

          function onMouseUp() {
            active = false;

            resizer.classList.remove("active");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";

            document.removeEventListener("mousemove", onMouseMove);
            document.removeEventListener("mouseup", onMouseUp);

            saveAll();
          }

          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
        });
      });
    }

    function enableTableWidthResize() {
      let startX = 0;
      let startWidth = 0;
      let resizing = false;

      tableWidthResizer.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();

        resizing = true;
        startX = e.pageX;
        startWidth = tableWrap.getBoundingClientRect().width;

        tableWidthResizer.classList.add("active");
        tableWrap.classList.add("resizing");

        document.body.style.cursor = "ew-resize";
        document.body.style.userSelect = "none";

        function onMouseMove(ev) {
          if (!resizing) {
            return;
          }

          const diff = ev.pageX - startX;
          const parentWidth = tableWrap.parentElement.getBoundingClientRect().width;
          const newWidth = Math.max(
            600,
            Math.min(
              parentWidth,
              Math.round(startWidth + diff)
            )
          );

          tableWrap.style.width = `${newWidth}px`;
        }

        function onMouseUp() {
          resizing = false;

          tableWidthResizer.classList.remove("active");
          tableWrap.classList.remove("resizing");

          document.body.style.cursor = "";
          document.body.style.userSelect = "";

          document.removeEventListener("mousemove", onMouseMove);
          document.removeEventListener("mouseup", onMouseUp);

          saveAll();
        }

        document.addEventListener("mousemove", onMouseMove);
        document.addEventListener("mouseup", onMouseUp);
      });
    }

    function isColumnResizeInProgress() {
      return !!document.querySelector(".col-resizer.active");
    }

    function isTableResizeInProgress() {
      return tableWidthResizer.classList.contains("active");
    }

    enableColumnResize();
    enableTableWidthResize();
    loadAll();
  </script>
</body>
</html>

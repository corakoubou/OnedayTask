<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>一日タスク管理</title>

  <style>
    :root {
      --bg: #1f1f25;
      --panel: #2a2a33;
      --panel2: #343441;
      --text: #f2f2f2;
      --muted: #b7b7c9;
      --line: #4a4a5c;
      --accent: #4a90e2;
      --danger: #d9534f;
      --success: #4caf50;
      --warning: #ffb300;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Meiryo", sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .toolbar button {
      flex: 1 1 0;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      line-height: 1.2;
      min-height: 38px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-copy {
      background: #6f7cff;
    }

    .btn-status {
      width: 100%;
      min-height: 32px;
      padding: 7px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-todo {
      background: #6c757d;
    }

    .status-doing {
      background: var(--warning);
      color: #222;
    }

    .status-done {
      background: var(--success);
    }

    .table-wrap {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.work-col {
      width: 48%;
    }

    col.state-col {
      width: 24%;
    }

    col.action-col {
      width: 28%;
    }

    thead {
      background: var(--panel2);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: center;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      white-space: nowrap;
    }

    td {
      font-size: 12px;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .cell-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 112px;
    }

    .cell-block {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 6px;
    }

    .block-title {
      display: block;
      margin-bottom: 5px;
      font-size: 10px;
      color: var(--muted);
      text-align: left;
      line-height: 1.2;
    }

    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .one-col {
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: #1b1b22;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 6px;
      font-size: 12px;
      min-width: 0;
      min-height: 32px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.16);
    }

    .time-input {
      text-align: center;
      font-family: Consolas, monospace;
      font-size: 11px;
      padding: 7px 4px;
    }

    .task-input {
      text-align: left;
    }

    .surplus-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border-radius: 6px;
      background: #1b1b22;
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
      font-size: 12px;
      padding: 4px;
    }

    .surplus-plus {
      color: #ff8a80;
    }

    .surplus-minus {
      color: #80cbc4;
    }

    .surplus-zero {
      color: var(--muted);
    }

    .check-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border-radius: 6px;
      background: #1b1b22;
      border: 1px solid var(--line);
      padding: 4px;
    }

    .check-wrap input {
      transform: scale(1.15);
      margin: 0;
      cursor: pointer;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .action-grid button {
      width: 100%;
      min-height: 32px;
      padding: 7px 4px;
      font-size: 11px;
    }

    .empty-box {
      padding: 16px 10px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.7;
      padding: 0 2px;
    }

    @media (max-width: 400px) {
      body {
        padding: 6px;
      }

      .wrap {
        max-width: 100%;
      }

      h1 {
        font-size: 18px;
      }

      th,
      td {
        padding: 6px 4px;
      }

      .cell-stack {
        gap: 6px;
        min-height: 106px;
      }

      .cell-block {
        padding: 5px;
      }

      input[type="text"] {
        font-size: 11px;
      }

      .time-input {
        font-size: 10px;
      }

      .action-grid button,
      .btn-status {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>一日タスク管理</h1>

    <div class="toolbar">
      <button id="addTaskBtn" type="button">タスク作成</button>
      <button id="resetAllBtn" type="button" class="btn-danger">保存データ初期化</button>
    </div>

    <div class="table-wrap">
      <table id="taskTable">
        <colgroup>
          <col class="work-col" />
          <col class="state-col" />
          <col class="action-col" />
        </colgroup>
        <thead>
          <tr>
            <th>作業</th>
            <th>状態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>

    <div class="empty-box" id="emptyBox" hidden>
      タスクがまだないっす。タスク作成で追加するっす。
    </div>

    <div class="hint">
      ※ 横スクロールなしのスマホ向け表形式っす。<br />
      ※ 1行の中を2段に分けて情報を詰めているっす。<br />
      ※ 状態は「未着手 → 仕掛 → 完了」の順で切り替わるっす。<br />
      ※ 時間は HH:MM 形式っす。<br />
      ※ データは自動保存するっす。
    </div>
  </div>

  <script>
    const STORAGE_KEY_ROWS = "dailyTaskManager.mobileTable.rows";

    const STATUS_TODO = "未着手";
    const STATUS_DOING = "仕掛";
    const STATUS_DONE = "完了";

    const tableBody = document.getElementById("taskTableBody");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const resetAllBtn = document.getElementById("resetAllBtn");
    const emptyBox = document.getElementById("emptyBox");

    addTaskBtn.addEventListener("click", () => {
      const newRow = addRow();
      saveAll();

      const taskInput = newRow.querySelector(".task-name");
      if (taskInput) {
        taskInput.focus();
      }
    });

    resetAllBtn.addEventListener("click", () => {
      const ok = confirm("保存データを初期化しますか？");
      if (!ok) {
        return;
      }

      localStorage.removeItem(STORAGE_KEY_ROWS);
      tableBody.innerHTML = "";
      addRow();
      saveAll();
    });

    function createDefaultRowData() {
      return {
        startTime: "",
        endTime: "",
        taskName: "",
        status: STATUS_TODO,
        incomplete: false,
        surplusText: "",
        surplusClass: "surplus-zero"
      };
    }

    function addRow(data = null, insertAfterRow = null) {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>
          <div class="cell-stack">
            <div class="cell-block">
              <span class="block-title">予定開始 / 予定終了</span>
              <div class="two-cols">
                <input
                  type="text"
                  class="time-input start-time"
                  placeholder="00:00"
                  maxlength="5"
                />
                <input
                  type="text"
                  class="time-input end-time"
                  placeholder="00:00"
                  maxlength="5"
                />
              </div>
            </div>

            <div class="cell-block">
              <span class="block-title">タスク名</span>
              <div class="one-col">
                <input
                  type="text"
                  class="task-input task-name"
                  placeholder="タスク名"
                />
              </div>
            </div>
          </div>
        </td>

        <td>
          <div class="cell-stack">
            <div class="cell-block">
              <span class="block-title">状態</span>
              <button
                type="button"
                class="btn-status status-todo"
              >${STATUS_TODO}</button>
            </div>

            <div class="cell-block">
              <span class="block-title">過不足</span>
              <div class="surplus-cell surplus-zero"></div>
            </div>
          </div>
        </td>

        <td>
          <div class="cell-stack">
            <div class="cell-block">
              <span class="block-title">未完了</span>
              <label class="check-wrap">
                <input
                  type="checkbox"
                  class="incomplete-check"
                />
              </label>
            </div>

            <div class="cell-block">
              <span class="block-title">複製 / 削除</span>
              <div class="action-grid">
                <button
                  type="button"
                  class="btn-copy copy-btn"
                >複製</button>
                <button
                  type="button"
                  class="btn-danger delete-btn"
                >削除</button>
              </div>
            </div>
          </div>
        </td>
      `;

      if (insertAfterRow && insertAfterRow.parentNode === tableBody) {
        insertAfterRow.insertAdjacentElement("afterend", tr);
      } else {
        tableBody.appendChild(tr);
      }

      bindRowEvents(tr);
      applyRowDataToElement(tr, data || createDefaultRowData());
      toggleEmpty();
      return tr;
    }

    function bindRowEvents(tr) {
      const startInput = tr.querySelector(".start-time");
      const endInput = tr.querySelector(".end-time");
      const taskInput = tr.querySelector(".task-name");
      const incompleteCheck = tr.querySelector(".incomplete-check");
      const statusBtn = tr.querySelector(".btn-status");
      const copyBtn = tr.querySelector(".copy-btn");
      const deleteBtn = tr.querySelector(".delete-btn");

      startInput.addEventListener("blur", () => {
        startInput.value = normalizeTimeInputValue(startInput.value);
        saveAll();
      });

      endInput.addEventListener("blur", () => {
        endInput.value = normalizeTimeInputValue(endInput.value);
        saveAll();
      });

      taskInput.addEventListener("input", () => {
        saveAll();
      });

      incompleteCheck.addEventListener("change", () => {
        saveAll();
      });

      statusBtn.addEventListener("click", () => {
        cycleStatus(tr);
      });

      copyBtn.addEventListener("click", () => {
        const rowData = readRowDataFromElement(tr);
        addRow(rowData, tr);
        saveAll();
      });

      deleteBtn.addEventListener("click", () => {
        tr.remove();

        if (tableBody.querySelectorAll("tr").length === 0) {
          addRow();
        }

        saveAll();
      });
    }

    function readRowDataFromElement(tr) {
      const surplusCell = tr.querySelector(".surplus-cell");

      return {
        startTime: tr.querySelector(".start-time").value,
        endTime: tr.querySelector(".end-time").value,
        taskName: tr.querySelector(".task-name").value,
        status: tr.querySelector(".btn-status").textContent,
        incomplete: tr.querySelector(".incomplete-check").checked,
        surplusText: surplusCell.textContent,
        surplusClass: getSurplusClass(surplusCell)
      };
    }

    function applyRowDataToElement(tr, data) {
      tr.querySelector(".start-time").value = data.startTime || "";
      tr.querySelector(".end-time").value = data.endTime || "";
      tr.querySelector(".task-name").value = data.taskName || "";
      tr.querySelector(".incomplete-check").checked = !!data.incomplete;

      setStatus(tr, data.status || STATUS_TODO, false);

      const surplusCell = tr.querySelector(".surplus-cell");
      surplusCell.textContent = data.surplusText || "";
      surplusCell.classList.remove("surplus-zero", "surplus-plus", "surplus-minus");
      surplusCell.classList.add(data.surplusClass || "surplus-zero");

      if (!data.surplusText) {
        surplusCell.classList.add("surplus-zero");
      }
    }

    function getSurplusClass(cell) {
      if (cell.classList.contains("surplus-plus")) {
        return "surplus-plus";
      }

      if (cell.classList.contains("surplus-minus")) {
        return "surplus-minus";
      }

      return "surplus-zero";
    }

    function cycleStatus(tr) {
      const btn = tr.querySelector(".btn-status");
      const current = btn.textContent;

      if (current === STATUS_TODO) {
        const ok = confirm("仕掛ますか？");
        if (!ok) {
          return;
        }

        setStatus(tr, STATUS_DOING, true);
        updateSurplusForDoing(tr);
        saveAll();
        return;
      }

      if (current === STATUS_DOING) {
        setStatus(tr, STATUS_DONE, true);
        saveAll();
        return;
      }

      if (current === STATUS_DONE) {
        const ok = confirm("未着手にしますか？");
        if (!ok) {
          return;
        }

        setStatus(tr, STATUS_TODO, true);
        clearSurplus(tr);
        saveAll();
      }
    }

    function setStatus(tr, status, resetIfTodo) {
      const btn = tr.querySelector(".btn-status");

      btn.textContent = status;
      btn.classList.remove("status-todo", "status-doing", "status-done");

      if (status === STATUS_TODO) {
        btn.classList.add("status-todo");

        if (resetIfTodo) {
          clearSurplus(tr);
        }

        return;
      }

      if (status === STATUS_DOING) {
        btn.classList.add("status-doing");
        return;
      }

      if (status === STATUS_DONE) {
        btn.classList.add("status-done");
      }
    }

    function updateSurplusForDoing(tr) {
      const startValue = tr.querySelector(".start-time").value;
      const surplusCell = tr.querySelector(".surplus-cell");

      if (!isValidTime(startValue)) {
        surplusCell.textContent = "";
        surplusCell.classList.remove("surplus-plus", "surplus-minus");
        surplusCell.classList.add("surplus-zero");
        return;
      }

      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const plannedStartMinutes = timeStringToMinutes(startValue);
      const diffMinutes = currentMinutes - plannedStartMinutes;

      surplusCell.classList.remove("surplus-zero", "surplus-plus", "surplus-minus");

      if (diffMinutes > 0) {
        surplusCell.textContent = `+${diffMinutes}分`;
        surplusCell.classList.add("surplus-plus");
        return;
      }

      if (diffMinutes < 0) {
        surplusCell.textContent = `${diffMinutes}分`;
        surplusCell.classList.add("surplus-minus");
        return;
      }

      surplusCell.textContent = "0分";
      surplusCell.classList.add("surplus-zero");
    }

    function clearSurplus(tr) {
      const surplusCell = tr.querySelector(".surplus-cell");
      surplusCell.textContent = "";
      surplusCell.classList.remove("surplus-plus", "surplus-minus");
      surplusCell.classList.add("surplus-zero");
    }

    function normalizeTimeInputValue(value) {
      if (!value) {
        return "";
      }

      const digits = value.replace(/\D/g, "");

      if (digits.length === 0) {
        return "";
      }

      let hh = "00";
      let mm = "00";

      if (digits.length <= 2) {
        hh = digits.padStart(2, "0");
      } else {
        const padded = digits.slice(0, 4).padEnd(4, "0");
        hh = padded.slice(0, 2);
        mm = padded.slice(2, 4);
      }

      let h = Number(hh);
      let m = Number(mm);

      if (Number.isNaN(h) || Number.isNaN(m)) {
        return "";
      }

      if (h > 23) {
        h = 23;
      }

      if (m > 59) {
        m = 59;
      }

      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function isValidTime(value) {
      return /^([01]\d|2[0-3]):[0-5]\d$/.test(value);
    }

    function timeStringToMinutes(value) {
      const parts = value.split(":");
      const hh = Number(parts[0]);
      const mm = Number(parts[1]);
      return hh * 60 + mm;
    }

    function saveRows() {
      const rows = [...tableBody.querySelectorAll("tr")].map((tr) => {
        return readRowDataFromElement(tr);
      });

      localStorage.setItem(STORAGE_KEY_ROWS, JSON.stringify(rows));
    }

    function loadRows() {
      const raw = localStorage.getItem(STORAGE_KEY_ROWS);

      if (!raw) {
        return;
      }

      let rows = [];

      try {
        rows = JSON.parse(raw);
      } catch (error) {
        rows = [];
      }

      if (!Array.isArray(rows)) {
        return;
      }

      rows.forEach((rowData) => {
        addRow(rowData);
      });
    }

    function toggleEmpty() {
      const hasRows = tableBody.querySelectorAll("tr").length > 0;
      emptyBox.hidden = hasRows;
    }

    function saveAll() {
      toggleEmpty();
      saveRows();
    }

    function loadAll() {
      loadRows();

      if (tableBody.querySelectorAll("tr").length === 0) {
        addRow();
      }

      toggleEmpty();
    }

    loadAll();
  </script>
</body>
</html>
